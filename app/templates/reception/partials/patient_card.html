<div class="patient-card" id="patient-card-{{ patient.id }}" style="border: 1px solid #ccc; padding: 1em; margin: 1em; display: inline-block; width: 30%;">
    <div class="patient-actions" style="float: right;">
        <button 
            hx-get="/reception/patient/{{ patient.id }}/confirm-delete"
            hx-target="#patient-card-{{ patient.id }}"
            hx-swap="outerHTML"
            style="background: none; border: none; cursor: pointer;"
        >
            🗑️
        </button>
    </div>
    <div class="status-dots">
        <span style="height: 10px; width: 10px; border-radius: 50%; display: inline-block; background-color: {% if 'ozelle' in patient.sources_received %}green{% else %}gray{% endif %};"></span>
        <span style="height: 10px; width: 10px; border-radius: 50%; display: inline-block; background-color: {% if 'fujifilm' in patient.sources_received %}green{% else %}gray{% endif %};"></span>
        <span style="height: 10px; width: 10px; border-radius: 50%; display: inline-block; background-color: {% if 'json' in patient.sources_received %}green{% else %}gray{% endif %};"></span>
    </div>
    <div class="patient-info" 
         {% if patient.result_id %}
         hx-post="/taller/load-patient/{{ patient.result_id }}"
         hx-target="#workshop-view" 
         hx-swap="innerHTML"
         {% endif %}
         style="cursor: pointer;"
    >
        {% if patient.name and patient.name != "" %}
            <p><strong>{% if patient.session_code %}{{ patient.session_code }} - {% endif %}{{ patient.name }}</strong></p>
            <p>{{ patient.species }}</p>
        {% else %}
            <p><strong>{% if patient.session_code %}{{ patient.session_code }}{% endif %}</strong></p>
        {% endif %}
    </div>
</div>
