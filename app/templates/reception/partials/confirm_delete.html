<div class="confirmation-dialog" style="border: 1px solid red; padding: 1em; margin: 1em;">
    <p>¿Estás seguro de que quieres eliminar a este paciente?</p>
    <button
        hx-delete="/reception/patient/{{ patient_id }}"
        hx-target="closest .patient-card"
        hx-swap="outerHTML"
        class="btn btn-danger"
    >
        Confirmar
    </button>
    <button
        hx-get="/reception/patient-card/{{ patient_id }}"
        hx-target="closest .confirmation-dialog"
        hx-swap="outerHTML"
        class="btn btn-secondary"
    >
        Cancelar
    </button>
</div>
