<div class="archived-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; padding: 1rem;">
  {% for patient in patients %}
    <div class="patient-card" id="patient-card-{{ patient.id }}" style="background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 1rem; opacity: 0.7;">
      <p><strong>{% if patient.session_code %}{{ patient.session_code }} - {% endif %}{{ patient.name }}</strong></p>
      <p>{{ patient.species }}</p>
      {% if patient.owner_name %}
        <p>{{ patient.owner_name }}</p>
      {% endif %}
      <button
        hx-post="/reception/patient/{{ patient.id }}/restore"
        hx-target="#sync-status"
        hx-swap="innerHTML"
        hx-on::after-request="document.getElementById('patient-card-{{ patient.id }}').remove(); if(document.querySelectorAll('.archived-grid .patient-card').length === 0) { location.reload(); }"
        style="margin-top: 0.5rem; background: #3b82f6; color: white; border: none; border-radius: 0.25rem; padding: 0.25rem 0.75rem; cursor: pointer;"
      >
        🔄 Restaurar
      </button>
    </div>
  {% endfor %}
  {% if not patients %}
    <p style="color: #6b7280; text-align: center; padding: 2rem;">📦 Sin resultados archivados</p>
  {% endif %}
</div>
